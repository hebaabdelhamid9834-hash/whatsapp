workflows:
  ios-app-store:
    name: iOS App Store Release
    # --- ADD THIS SECTION ---
    integrations:
      app_store_connect: "Your Integration Name" # The name you gave it in Team Settings
    # -------------------------
    instance_type: mac_mini_m2
    environment:
      groups:
        - app_store_credentials
    scripts:
      - name: Install dependencies
        script: | 
          npm install
          cd ios && pod install
      # ... (rest of your scripts)
    publishing:
      app_store_connect:
        auth: integration # This now knows which integration to use
        submit_to_testflight: true
