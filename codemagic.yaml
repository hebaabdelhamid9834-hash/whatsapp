workflows:
  ios-release:
    name: iOS App Store Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      groups:
        - apple_auth 
      vars:
        XCODE_WORKSPACE: "ios/WaCRM.xcworkspace" 
        XCODE_SCHEME: "WaCRM" 
        BUNDLE_ID: "com.whatsapp.serv5"
      # This is the correct place for environment-level build settings
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Install CocoaPods
        script: cd ios && pod install
      - name: iOS Code Signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --certificate-key "$APP_STORE_CONNECT_PRIVATE_KEY" \
            --project-type IOS
          keychain add-certificates
          xcode-project use-profiles
      - name: Build iOS project
        script: |
          # Force Manual Signing in the project file
          PROJECT_FILE="ios/WaCRM.xcodeproj/project.pbxproj"
          sed -i '' 's/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g' "$PROJECT_FILE"
          
          # Build using standard xcodebuild flags passed directly to the command
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --env-vars "CODE_SIGN_STYLE=Manual CODE_SIGN_IDENTITY=\"Apple Distribution\" PROVISIONING_PROFILE_SPECIFIER=$CM_PROVISIONING_PROFILE_ID"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
