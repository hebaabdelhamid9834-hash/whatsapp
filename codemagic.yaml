workflows:
  ios-release:
    name: iOS App Store Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      groups:
        - apple_auth 
      vars:
        # Check your ios folder: if the file is whatsapp.xcworkspace, use that.
        XCODE_WORKSPACE: "ios/whatsapp.xcworkspace" 
        XCODE_SCHEME: "whatsapp"
        BUNDLE_ID: "com.your.bundle.id" 
      node: latest
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Install CocoaPods
        script: cd ios && pod install
      - name: iOS Code Signing
        script: |
          keychain initialize
          # This command requires APP_STORE_CONNECT_KEY_IDENTIFIER to be in the apple_auth group
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --certificate-key "$APP_STORE_CONNECT_PRIVATE_KEY" \
            --project-type IOS
          keychain add-certificates
          xcode-project use-profiles
      - name: Build iOS project
        script: |
          # Use xcode-project build-ipa with explicit pathing
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
