workflows:
  ios-release:
    name: iOS App Store Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      groups:
        - apple_auth 
      vars:
        XCODE_WORKSPACE: "ios/expo-wacrm.xcworkspace" # Adjusted based on your folder name
        XCODE_SCHEME: "expo-wacrm" 
        BUNDLE_ID: "com.yourcompany.app" 
      node: latest
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true

    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Install CocoaPods
        script: |
          cd ios && pod install
      - name: iOS Code Signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" --project-type IOS --certificate-key "$APP_STORE_CONNECT_PRIVATE_KEY"
          keychain add-certificates
          xcode-project use-profiles
      - name: Build iOS project
        script: |
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-app-store-build-number "$APP_ID")
          UPDATED_BUILD_NUMBER=$((LATEST_BUILD_NUMBER + 1))
          
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --build-number "$UPDATED_BUILD_NUMBER"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      # Option A: If you have linked App Store Connect in Codemagic UI (Integrations)
      app_store_connect:
        auth: integration 
        submit_to_testflight: true
