workflows:
  expo_ios:
    name: Expo iOS Build
    max_build_duration: 60
    environment:
      node: 18
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          npm install -g eas-cli
          npm install
      - name: Build iOS
        script: |
          eas login --token $EXPO_TOKEN
          eas build -p ios --non-interactive
    artifacts:
      - '**/*.ipa'
