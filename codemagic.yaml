workflows:
  ios-release:
    name: iOS App Store Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      groups:
        - apple_auth 
      vars:
        XCODE_WORKSPACE: "ios/WaCRM.xcworkspace" 
        XCODE_SCHEME: "WaCRM" 
        BUNDLE_ID: "com.whatsapp.serv5"
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Install CocoaPods
        script: cd ios && pod install
      - name: iOS Code Signing
        script: |
          keychain initialize
          # جلب الملفات مع التحقق من الباقة
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --certificate-key "$APP_STORE_CONNECT_PRIVATE_KEY" \
            --project-type IOS \
            --create
          
          # سطر سحري: لو ملقاش بروفايل، يوقف البلد هنا بدل ما يضيع وقت في خطوة الـ Build
          ls ~/Library/MobileDevice/Provisioning\ Profiles || echo "No profiles found!"
          
          keychain add-certificates
          xcode-project use-profiles
      - name: Build iOS project
        script: |
          # 1. استخراج الـ UUID والاسم بشكل أكثر دقة
          PROV_PROFILE_PATH=$(ls ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision | head -n 1)
          PROV_PROFILE_UUID=$(grep -aA1 "UUID" "$PROV_PROFILE_PATH" | grep -o "[-A-Z0-9]\{36\}")
          
          echo "Using Profile UUID: $PROV_PROFILE_UUID"

          # 2. تعديل ملف المشروع لفرض الـ UUID ده في كل مكان
          PROJECT_FILE="ios/WaCRM.xcodeproj/project.pbxproj"
          sed -i '' 's/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g' "$PROJECT_FILE"
          sed -i '' "s/PROVISIONING_PROFILE = \".*\";/PROVISIONING_PROFILE = \"$PROV_PROFILE_UUID\";/g" "$PROJECT_FILE"
          sed -i '' "s/PROVISIONING_PROFILE_SPECIFIER = \".*\";/PROVISIONING_PROFILE_SPECIFIER = \"$PROV_PROFILE_UUID\";/g" "$PROJECT_FILE"
          
          # 3. بناء الـ IPA باستخدام xcodebuild مباشرة لضمان أقصى توافق
          xcodebuild archive \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath build/ios/xcarchive/WaCRM.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROV_PROFILE_UUID" \
            DEVELOPMENT_TEAM="C2Y84Q9T6Y" # التيم ID بتاعك من الصورة

          # 4. تصدير ملف الـ IPA
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
