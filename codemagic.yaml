workflows:
  ios-release:
    name: iOS App Store Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      groups:
        - apple_auth # This must match the group name you created in the UI
      vars:
        XCODE_WORKSPACE: "ios/expo-wacrm.xcworkspace" # Based on your folder: expo-wacrm
        XCODE_SCHEME: "expo-wacrm" 
        BUNDLE_ID: "com.your.bundle.id" # Update this to your real Bundle ID
      node: latest
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Install CocoaPods
        script: cd ios && pod install
      - name: iOS Code Signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" --project-type IOS --certificate-key "$APP_STORE_CONNECT_PRIVATE_KEY"
          keychain add-certificates
          xcode-project use-profiles
      - name: Build iOS project
        script: |
          # Automatically increments build number
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-app-store-build-number "$APP_ID")
          UPDATED_BUILD_NUMBER=$((LATEST_BUILD_NUMBER + 1))
          
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --build-number "$UPDATED_BUILD_NUMBER"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        # Use explicit variables to avoid the "integration" validation error
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
