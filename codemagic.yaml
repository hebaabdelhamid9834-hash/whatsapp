workflows:
  ios-release:
    name: iOS App Store Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      groups:
        - apple_auth 
      vars:
        XCODE_WORKSPACE: "ios/WaCRM.xcworkspace" 
        XCODE_SCHEME: "WaCRM" 
        BUNDLE_ID: "com.whatsapp.serv5" # Verified from your last log
      node: latest
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Install CocoaPods
        script: cd ios && pod install
      - name: iOS Code Signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --certificate-key "$APP_STORE_CONNECT_PRIVATE_KEY" \
            --project-type IOS
          keychain add-certificates
          xcode-project use-profiles
      - name: Build iOS project
        script: |
          # 1. Force Manual Signing and inject the Bundle ID into the project file
          PROJECT_FILE="ios/WaCRM.xcodeproj/project.pbxproj"
          sed -i '' 's/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g' "$PROJECT_FILE"
          sed -i '' "s/PRODUCT_BUNDLE_IDENTIFIER = [^;]*;/PRODUCT_BUNDLE_IDENTIFIER = $BUNDLE_ID;/g" "$PROJECT_FILE"
          
          # 2. Run build with standard flags only
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
